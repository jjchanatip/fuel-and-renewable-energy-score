<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งคะแนน | Eco-Agri Energy</title>
    <!-- ใช้ Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #a5d6a7 50%, #fff9c4 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ของตกแต่งพื้นหลัง */
        .bg-shapes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
        }
        .shape {
            position: absolute; filter: blur(40px); opacity: 0.4; animation: float 10s infinite ease-in-out;
        }
        .shape-1 { width: 300px; height: 300px; background: #4caf50; top: -10%; left: -10%; border-radius: 50%; }
        .shape-2 { width: 400px; height: 400px; background: #ffeb3b; bottom: -20%; right: -10%; border-radius: 50%; animation-delay: -5s; }
        .shape-3 { width: 250px; height: 250px; background: #00bcd4; top: 40%; left: 60%; border-radius: 50%; animation-delay: -2s; opacity: 0.3; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* การจัดกลุ่มคะแนนตามสี (Dynamic) */
        .group-color-1 { border-left: 4px solid #3b82f6; background-color: #eff6ff; } /* Blue - น้ำ */
        .group-color-2 { border-left: 4px solid #eab308; background-color: #fefce8; } /* Yellow - แสงอาทิตย์ */
        .group-color-3 { border-left: 4px solid #22c55e; background-color: #f0fdf4; } /* Green - ชีวมวล */
        .group-color-4 { border-left: 4px solid #f97316; background-color: #fff7ed; } /* Orange - ความร้อน */
        .group-color-5 { border-left: 4px solid #a855f7; background-color: #faf5ff; } /* Purple - อื่นๆ */
        .group-color-default { border-left: 4px solid #64748b; background-color: #f8fafc; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #22c55e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ซ่อนแสดงหน้าจอ */
        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- พื้นหลัง -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Container หลัก -->
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">

            <!-- ==================== หน้า Login / นำทาง ==================== -->
            <div id="login-screen" class="screen active slide-up">
                <div class="glass-card rounded-3xl p-8 shadow-xl text-center relative overflow-hidden">
                    <!-- Icon -->
                    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600 shadow-inner">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </div>
                    
                    <h1 class="text-2xl font-bold text-green-800 mb-2">ระบบแจ้งคะแนน</h1>
                    <p class="text-sm text-gray-600 mb-6">ธีมเชื้อเพลิงการคมนาคม & พลังงานเกษตร</p>

                    <form id="login-form" class="space-y-4">
                        <div>
                            <input type="number" id="login-id" required placeholder="รหัสประจำตัวนักเรียน (5 หลัก)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500 bg-white/50 transition-all text-center tracking-widest">
                        </div>
                        <div>
                            <input type="tel" id="login-phone" required placeholder="เบอร์โทรศัพท์ผู้ปกครอง (10 หลัก)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500 bg-white/50 transition-all text-center tracking-widest">
                        </div>
                        <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold shadow-lg hover:shadow-green-500/30 transform transition hover:-translate-y-1">
                            เข้าสู่ระบบดูคะแนน
                        </button>
                    </form>

                    <div class="mt-6 pt-6 border-t border-gray-200/50">
                        <p class="text-sm text-gray-500">นักเรียนใหม่ยังไม่เคยบันทึกเบอร์โทร?</p>
                        <button onclick="switchScreen('register-screen')" class="mt-2 text-green-600 font-medium hover:text-green-800 underline transition-colors">
                            ลงทะเบียนเบอร์โทรศัพท์ที่นี่
                        </button>
                    </div>
                </div>
            </div>

            <!-- ==================== หน้า Register ==================== -->
            <div id="register-screen" class="screen">
                <div class="glass-card rounded-3xl p-8 shadow-xl text-center">
                    <button onclick="switchScreen('login-screen')" class="absolute top-6 left-6 text-gray-500 hover:text-gray-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    
                    <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4 text-yellow-600">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-1">ลงทะเบียนเบอร์โทรผู้ปกครอง</h2>
                    <p class="text-sm text-gray-500 mb-6">ผูกเบอร์โทรเข้ากับรหัสประจำตัวนักเรียน</p>

                    <form id="register-form" class="space-y-4">
                        <div>
                            <input type="number" id="reg-id" required placeholder="รหัสประจำตัวนักเรียน (5 หลัก)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-500 bg-white/50 text-center tracking-widest">
                        </div>
                        <div>
                            <input type="tel" id="reg-phone" required placeholder="เบอร์โทรศัพท์ผู้ปกครอง (10 หลัก)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-500 bg-white/50 text-center tracking-widest">
                        </div>
                        <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-semibold shadow-lg hover:shadow-yellow-500/30 transform transition hover:-translate-y-1">
                            บันทึกข้อมูล
                        </button>
                    </form>
                </div>
            </div>

            <!-- ==================== หน้า Dashboard แสดงคะแนน ==================== -->
            <div id="dashboard-screen" class="screen max-w-2xl w-full">
                <!-- ข้อมูลนักเรียน -->
                <div class="glass-card rounded-3xl p-6 shadow-lg mb-6 relative overflow-hidden slide-up" style="animation-delay: 0.1s;">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-24 h-24 text-green-800" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path></svg>
                    </div>
                    
                    <button onclick="switchScreen('login-screen')" class="mb-4 flex items-center text-sm text-green-700 hover:text-green-900 font-medium bg-green-50 px-3 py-1 rounded-full w-max">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        ออกจากระบบ
                    </button>
                    
                    <div class="flex items-center space-x-4 mb-2">
                        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center text-white text-xl font-bold shadow-md">
                            <span id="display-number">-</span>
                        </div>
                        <div>
                            <h2 id="display-name" class="text-xl font-bold text-gray-800">ชื่อ - นามสกุล</h2>
                            <p class="text-sm text-gray-500">รหัส: <span id="display-id" class="font-medium text-gray-700">-----</span> | ชั้น: <span id="display-class" class="font-medium text-green-600">ม.-/-</span></p>
                        </div>
                    </div>
                </div>

                <!-- รายการคะแนน (จะถูกสร้างด้วย Javascript) -->
                <div id="scores-container" class="space-y-4 pb-10">
                    <!-- โครงสร้างคะแนนตัวอย่าง (จะถูกลบและแทนที่) -->
                </div>
            </div>

        </div>
    </div>

    <!-- ==================== Loading Overlay ==================== -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden fade-in">
        <div class="loader mb-4"></div>
        <p class="text-green-700 font-medium">กำลังประมวลผลข้อมูลพลังงาน...</p>
    </div>

    <!-- ==================== Custom Modal / Message Box ==================== -->
    <div id="custom-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden fade-in p-4">
        <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-sm w-full text-center transform transition-all scale-95" id="modal-content">
            <div id="modal-icon" class="mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center text-3xl"></div>
            <h3 id="modal-title" class="text-lg font-bold text-gray-900 mb-2">Title</h3>
            <p id="modal-message" class="text-gray-600 mb-6 text-sm">Message details here.</p>
            <button onclick="closeModal()" class="w-full py-2.5 rounded-xl bg-gray-100 text-gray-800 font-medium hover:bg-gray-200 transition-colors">
                ตกลง
            </button>
        </div>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
        // นำ URL ของ Web App จาก Google Apps Script มาใส่ในเครื่องหมายคำพูดด้านล่าง
        // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3Lr34Uz9n0zrnVoLqjCAE8sFIu4TC-vqqMAxHnJ41a0qiVtD0MqAS2dMqo-mCVwL9/exec'; 

        // จัดการหน้าจอ
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.classList.remove('slide-up');
            });
            const target = document.getElementById(screenId);
            target.classList.add('active');
            // Force reflow
            void target.offsetWidth;
            target.classList.add('slide-up');
            
            // เคลียร์ฟอร์ม
            document.getElementById('login-form').reset();
            document.getElementById('register-form').reset();
        }

        // แสดง/ซ่อน Loading
        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        // Custom Modal (แทน alert)
        function showMessage(title, message, type = 'info') {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const icon = document.getElementById('modal-icon');
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-message');

            titleEl.textContent = title;
            msgEl.textContent = message;

            if (type === 'success') {
                icon.innerHTML = '✅';
                icon.className = 'mx-auto mb-4 w-16 h-16 rounded-full bg-green-100 flex items-center justify-center text-3xl shadow-inner';
                titleEl.className = 'text-xl font-bold text-green-700 mb-2';
            } else if (type === 'error') {
                icon.innerHTML = '⚠️';
                icon.className = 'mx-auto mb-4 w-16 h-16 rounded-full bg-red-100 flex items-center justify-center text-3xl shadow-inner';
                titleEl.className = 'text-xl font-bold text-red-700 mb-2';
            } else {
                icon.innerHTML = 'ℹ️';
                icon.className = 'mx-auto mb-4 w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-3xl shadow-inner';
                titleEl.className = 'text-xl font-bold text-blue-700 mb-2';
            }

            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // จัดการลงทะเบียน
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('reg-id').value;
            const phone = document.getElementById('reg-phone').value;

            if(id.length !== 5) return showMessage('ข้อผิดพลาด', 'กรุณากรอกรหัสประจำตัว 5 หลัก', 'error');
            if(phone.length !== 10) return showMessage('ข้อผิดพลาด', 'กรุณากรอกเบอร์โทรศัพท์ 10 หลัก', 'error');
            if(SCRIPT_URL === 'YOUR_WEB_APP_URL_HERE') return showMessage('ข้อผิดพลาด', 'นักพัฒนาลืมใส่ API URL ในโค้ด', 'error');

            showLoading(true);
            try {
                const url = `${SCRIPT_URL}?action=register&id=${id}&phone=${phone}`;
                const response = await fetch(url);
                const result = await response.json();
                
                if(result.success) {
                    showMessage('สำเร็จ!', result.message, 'success');
                    switchScreen('login-screen');
                    // ใส่ข้อมูลรอไว้ให้เลย
                    document.getElementById('login-id').value = id;
                    document.getElementById('login-phone').value = phone;
                } else {
                    showMessage('เกิดข้อผิดพลาด', result.message, 'error');
                }
            } catch (error) {
                showMessage('ระบบขัดข้อง', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                showLoading(false);
            }
        });

        // จัดการเข้าสู่ระบบ
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('login-id').value;
            const phone = document.getElementById('login-phone').value;

            if(id.length !== 5) return showMessage('ข้อผิดพลาด', 'กรุณากรอกรหัสประจำตัว 5 หลัก', 'error');
            if(phone.length !== 10) return showMessage('ข้อผิดพลาด', 'กรุณากรอกเบอร์โทรศัพท์ 10 หลัก', 'error');
            if(SCRIPT_URL === 'YOUR_WEB_APP_URL_HERE') return showMessage('ข้อผิดพลาด', 'นักพัฒนาลืมใส่ API URL ในโค้ด', 'error');

            showLoading(true);
            try {
                const url = `${SCRIPT_URL}?action=login&id=${id}&phone=${phone}`;
                const response = await fetch(url);
                const result = await response.json();
                
                if(result.success) {
                    renderDashboard(result.student, result.scores);
                    switchScreen('dashboard-screen');
                } else {
                    showMessage('ไม่สามารถเข้าสู่ระบบได้', result.message, 'error');
                }
            } catch (error) {
                showMessage('ระบบขัดข้อง', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                showLoading(false);
            }
        });

        // จัดกลุ่มและเรนเดอร์คะแนน
        function renderDashboard(student, scores) {
            // อัปเดตข้อมูลส่วนตัว
            document.getElementById('display-name').textContent = student.name;
            document.getElementById('display-id').textContent = student.id;
            document.getElementById('display-class').textContent = student.className;
            document.getElementById('display-number').textContent = student.number;

            const container = document.getElementById('scores-container');
            container.innerHTML = ''; // ล้างของเก่า

            // ประมวลผลและจัดกลุ่มคะแนน (แยกเลขข้างหน้าออก)
            // รูปแบบหัวคอลัมน์ที่คาดหวัง: "1 กิจกรรม 1.1", "2 สอบย่อย"
            const groupedScores = {};
            
            scores.forEach(item => {
                // ใช้ Regex จับกลุ่มตัวเลขชุดแรก ตามด้วยช่องว่าง (ถ้ามี) และข้อความที่เหลือ
                const match = item.headerName.trim().match(/^(\d+)\s*(.*)/);
                
                let groupId = "ทั่วไป";
                let cleanName = item.headerName;

                if (match) {
                    groupId = match[1]; // เลขกลุ่ม เช่น "1", "2"
                    cleanName = match[2]; // ชื่อที่ตัดเลขออกแล้ว เช่น "กิจกรรม 1.1"
                }

                if (!groupedScores[groupId]) {
                    groupedScores[groupId] = [];
                }
                groupedScores[groupId].push({ name: cleanName, score: item.score });
            });

            // สร้าง HTML สำหรับแต่ละกลุ่ม
            let delay = 0.2;
            const icons = ['💧', '☀️', '🌱', '🔥', '⚡']; // ไอคอนธีมพลังงาน

            Object.keys(groupedScores).forEach((groupKey, index) => {
                const groupData = groupedScores[groupKey];
                
                // กำหนดคลาสสีตามลำดับกลุ่ม (วนลูป 1-5)
                const colorIndex = (index % 5) + 1;
                const bgClass = `group-color-${colorIndex}`;
                const icon = groupKey === "ทั่วไป" ? '📊' : (icons[index % icons.length]);
                const groupTitle = groupKey === "ทั่วไป" ? "คะแนนส่วนอื่นๆ" : `ส่วนที่ ${groupKey}`;

                // สร้าง Card ของกลุ่ม
                const groupEl = document.createElement('div');
                groupEl.className = `glass-card rounded-2xl overflow-hidden shadow-sm slide-up ${bgClass}`;
                groupEl.style.animationDelay = `${delay}s`;
                delay += 0.1;

                // หัวกลุ่ม
                let htmlStr = `
                    <div class="px-5 py-3 border-b border-black/5 flex items-center justify-between">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2">
                            <span>${icon}</span> ${groupTitle}
                        </h3>
                    </div>
                    <div class="divide-y divide-black/5">
                `;

                // รายการคะแนนในกลุ่ม
                groupData.forEach(item => {
                    const displayScore = (item.score === "" || item.score === null) ? "-" : item.score;
                    const isHighlight = String(item.name).includes('หน่วย'); // เน้นสีถ้ามีคำว่าหน่วย

                    htmlStr += `
                        <div class="px-5 py-3 flex justify-between items-center hover:bg-white/40 transition-colors">
                            <span class="text-sm text-gray-700 ${isHighlight ? 'font-semibold' : ''}">${item.name}</span>
                            <span class="font-bold ${isHighlight ? 'text-lg text-black' : 'text-gray-800'}">${displayScore}</span>
                        </div>
                    `;
                });

                htmlStr += `</div>`;
                groupEl.innerHTML = htmlStr;
                container.appendChild(groupEl);
            });

            if(Object.keys(groupedScores).length === 0) {
                 container.innerHTML = `<div class="text-center py-8 text-gray-500 bg-white/50 rounded-xl glass-card">ยังไม่มีข้อมูลคะแนนในระบบ</div>`;
            }
        }
    </script>
</body>
</html>
